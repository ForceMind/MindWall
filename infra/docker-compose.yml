name: mindwall

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mindwall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindwall
      POSTGRES_PASSWORD: ${MW_PG_PASSWORD:-mindwall}
      POSTGRES_DB: mindwall
    ports:
      - "127.0.0.1:${MW_PG_PORT:-5433}:5432"
    volumes:
      - mindwall-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindwall -d mindwall"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindwall-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MW_REDIS_PORT:-6380}:6379"
    volumes:
      - mindwall-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mindwall-postgres-data:
  mindwall-redis-data:
