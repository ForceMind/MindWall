<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#060913" />
    <meta name="description" content="心垣 MindWall — 匿名社交沙盒，先建立心理连接，再决定是否破壁见面。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>心垣 MindWall</title>
    <style>
      body { margin: 0; background: #060913; }
      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(180deg, #060913, #081022);
        transition: opacity 0.4s ease;
      }
      #app-loader.hide { opacity: 0; pointer-events: none; }
      #app-loader .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(53, 208, 255, 0.15);
        border-top-color: #ff7a3d;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loader"><div class="spinner"></div></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', function () {
        var loader = document.getElementById('app-loader');
        if (loader) { loader.classList.add('hide'); setTimeout(function() { loader.remove(); }, 500); }
      });
    </script>
  </body>
</html>
